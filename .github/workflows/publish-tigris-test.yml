name: publish-tigris-test

# Standalone, manual-dispatch-only workflow that publishes a dummy version to
# Tigris (Fly's S3-compatible storage — same bucket as the build cache, under
# the `maven/` prefix). Used to measure Tigris publish wall time in isolation
# before deciding whether to retire GitHub Packages as the primary registry
# (#22). Does NOT touch the production publish flow (publish.yml) and does NOT
# upload to GitHub Packages.
#
# Trigger: Actions → publish-tigris-test → Run workflow. The version is
# always "<prefix>-<run_number>" so re-dispatching never 409s on a re-upload.

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: 'Version prefix; final version is "<prefix>-<run_number>"'
        default: '0.0.0-tigris-test'
        required: false

permissions:
  contents: read

concurrency:
  group: publish-tigris-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tigris-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
      S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Compute version
        run: |
          set -euo pipefail
          PREFIX="${{ github.event.inputs.prefix }}"
          if [ -z "$PREFIX" ]; then PREFIX="0.0.0-tigris-test"; fi
          VERSION="${PREFIX}-${{ github.run_number }}"
          echo "Publishing version: $VERSION"
          echo "PUBLISH_VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Diagnostic: probe Tigris-rejected request attributes ────────────────
      # Previous diagnostic (run 26556330231) proved the bucket accepts plain
      # PUTs via both path-style and virtual-host AWS CLI. Gradle's s3:// PUTs
      # 400 with no response body. Leading hypothesis (per settings.gradle.kts
      # comment from #25): Tigris rejects REDUCED_REDUNDANCY storage class.
      # This step tests storage class + a few other suspect attributes directly.
      - name: Probe Tigris request-attribute compatibility
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          EP: https://fly.storage.tigris.dev
        run: |
          set +e   # don't fail the step on a single probe — collect all results
          BODY=/tmp/tigris-probe.txt
          echo "probe $(date -u +%FT%TZ) run=${{ github.run_id }}" > "$BODY"
          PREFIX="maven-sanity/probe-${{ github.run_id }}"

          probe() {
            local label="$1" key="$2"; shift 2
            echo ""
            echo "── PROBE: $label ──"
            aws --endpoint-url=$EP s3api put-object \
              --bucket buildcache --key "$key" --body "$BODY" "$@" 2>&1 \
              | head -5
            echo "── exit: $? ──"
          }

          probe "control: no extra args (matches CLI default)"          "$PREFIX/control.txt"
          probe "explicit --storage-class STANDARD"                      "$PREFIX/std.txt"             --storage-class STANDARD
          probe "explicit --storage-class REDUCED_REDUNDANCY"            "$PREFIX/rr.txt"              --storage-class REDUCED_REDUNDANCY
          probe "explicit --acl bucket-owner-full-control"               "$PREFIX/acl-owner.txt"       --acl bucket-owner-full-control
          probe "explicit --acl private"                                 "$PREFIX/acl-private.txt"     --acl private
          probe "explicit --server-side-encryption AES256"               "$PREFIX/sse-aes.txt"         --server-side-encryption AES256
          true

      - name: Publish to Tigris (with --info --stacktrace for diagnostic)
        # workers.max=16 is publish-only (I/O-bound, oversubscribing CPU is safe).
        # --info + --stacktrace forces Gradle to surface the AWS SDK request /
        # response detail when the PUT 400s, so we can see *which* argument is
        # invalid instead of the generic "Invalid argument" wrapper.
        run: ./gradlew --info --stacktrace -Pversion=${{ env.PUBLISH_VERSION }} -Dorg.gradle.workers.max=16 publishAllPublicationsToTigrisRepository
