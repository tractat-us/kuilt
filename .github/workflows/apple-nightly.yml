name: apple-nightly

# Apple Kotlin/Native lane — out of band, NOT part of ci-required.
#
# WHY THIS EXISTS
#   ci.yml runs its whole KMP build (build-jvm + build-native) on ubuntu-latest.
#   The Apple K/N *test executions* — macosArm64Test and iosSimulatorArm64Test —
#   cannot run on Linux: their test binaries target arm64 Darwin, so on the
#   ubuntu build-native job those `*Test` tasks are effectively skipped and the
#   required `ci-required` check goes green without ever compiling+running the
#   Apple targets. Apple-target breakage stays invisible until someone builds
#   locally on a Mac (see #933).
#
# THE DECISION (deliberately cheap)
#   Keep per-PR CI Linux-only; run the full Apple lane on a scheduled nightly
#   build on a macOS runner. macOS runner minutes bill ~10x Linux, so this lane
#   is NOT wired into `ci-required` and is NOT a required status check — a red
#   run here notifies out of band without blocking any PR merge. Trigger it on
#   demand with `gh workflow run apple-nightly.yml` (workflow_dispatch).

on:
  schedule:
    # 07:00 UTC daily — a low-traffic hour; runs once per day off the default branch.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-nightly-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # ── apple ────────────────────────────────────────────────────────────────
  # Compiles and RUNS the Apple K/N test targets on a real macOS arm64 runner —
  # the executions ci.yml's ubuntu build-native can only skip. Standalone: no
  # dependency on ci.yml, not referenced by ci-required.
  apple:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false

      # Kotlin/Native toolchain + dependencies. setup-gradle caches ~/.gradle but
      # not ~/.konan, so without this every run re-downloads konan and recompiles
      # the native targets cold. Keyed on the toolchain-defining files, matching
      # ci.yml's konan cache step (macOS-scoped runner.os key).
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - name: macOS + iOS-sim K/N tests
        run: ./gradlew macosArm64Test iosSimulatorArm64Test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-apple
          path: |
            **/build/reports/tests/
            **/build/test-results/
