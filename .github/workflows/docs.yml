name: docs

# Publishes the full documentation suite to GitHub Pages on every push to main:
#
#   https://tractat-us.github.io/kuilt/         landing page (links to both)
#   https://tractat-us.github.io/kuilt/guide/   Writerside conceptual docs
#   https://tractat-us.github.io/kuilt/api/     Dokka multi-module API reference
#
# GitHub Pages allows only ONE deployment per repository, so the two doc surfaces
# are built independently and then ASSEMBLED into a single site/ artifact that is
# deployed once. Two separate deploy-pages calls would clobber each other.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deploys; don't cancel an in-flight deploy (a half-published
# site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # ── Writerside guide → guide/ ──────────────────────────────────────────────
  build-guide:
    runs-on: ubuntu-latest
    env:
      INSTANCE: Writerside/kuilt
      ARTIFACT: webHelpKUILT2-all.zip
      # Writerside builder image version (JetBrains-published; bump deliberately).
      DOCKER_VERSION: 243.21565
    steps:
      - uses: actions/checkout@v6

      - name: Build Writerside guide
        uses: JetBrains/writerside-github-action@v4
        with:
          instance: ${{ env.INSTANCE }}
          artifact: ${{ env.ARTIFACT }}
          docker-version: ${{ env.DOCKER_VERSION }}

      - name: Upload guide artifact
        uses: actions/upload-artifact@v4
        with:
          name: guide
          path: artifacts/${{ env.ARTIFACT }}
          retention-days: 7

  # ── Dokka API reference → api/ ─────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
      S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Generate API reference
        # Root dokkaGenerate aggregates every subproject into ONE multi-module
        # HTML site at build/dokka/html/ (see the dependencies block in build.gradle.kts).
        run: ./gradlew dokkaGenerate --max-workers=2

      - name: Upload api artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: build/dokka/html
          retention-days: 7

  # ── Assemble both into one site/ and deploy once ───────────────────────────
  deploy:
    needs: [build-guide, build-api]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download guide artifact
        uses: actions/download-artifact@v5
        with:
          name: guide
          path: guide-zip

      - name: Download api artifact
        uses: actions/download-artifact@v5
        with:
          name: api
          path: site/api

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p site/guide
          unzip -q guide-zip/*.zip -d site/guide
          cp .nojekyll site/.nojekyll 2>/dev/null || touch site/.nojekyll
          cat > site/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>kuilt documentation</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>
            body{font:16px/1.6 system-ui,sans-serif;max-width:40rem;margin:4rem auto;padding:0 1rem}
            a{display:block;margin:.5rem 0;padding:1rem;border:1px solid #ddd;border-radius:8px;text-decoration:none;color:inherit}
            a:hover{border-color:#888}
            h1{margin-bottom:.25rem}
          </style>
          <h1>kuilt</h1>
          <p>A peer-symmetric, multiplatform networking library.</p>
          <a href="./guide/"><strong>Guide →</strong><br>Concepts, usage, the CRDT zoo</a>
          <a href="./api/"><strong>API reference →</strong><br>Dokka multi-module API docs</a>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
