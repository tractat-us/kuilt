name: ci

# Fast feedback on every pull request and on push to main. Builds and
# tests every KMP target that runs on a GitHub-hosted ubuntu runner
# (JVM, Android, wasmJs, plus the iOS/macOS klibs compile). The mDNS
# multicast integration suite stays opt-in (-Pmdns.multicast.tests) so
# CI never depends on real multicast traffic. Publishing is separate
# (publish.yml, on push to main only).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip draft PRs — they re-run automatically when marked ready for review.
    # Pushes to main always build.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Build and test all targets
        run: ./gradlew build
