name: publish

# Publishes kuilt to Tigris (Fly's S3-compatible object storage). The publish
# wall time is now ~5 min total (~20 s for the actual upload via `aws s3 sync`),
# down from ~21 min on the old GitHub Packages path (#22, #24) — so we're back
# to publishing on every push to main, plus tag pushes and manual dispatch.
#
# Versioning:
#   - Tag push (v0.2.3 → 0.2.3)
#   - Push to main → 0.2.<run_number>  (continuous snapshots for consumers
#     pinning the latest)
#   - workflow_dispatch → input version or 0.2.<run_number>
#
# Why staging-dir + AWS CLI instead of Gradle's native s3:// transport:
# Gradle silently sets a request header (ACL or storage-class) Tigris rejects
# with HTTP 400. Probe results + cutover details in #22. Switching backends
# would just take a different upload step at the end — Gradle's job is to
# stage to build/staged-maven-repo/, nothing more.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 0.2.7 (defaults to 0.2.<run_number>).'
        required: false

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
      S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Compute version
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "push" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"      # tag push: v0.2.3 → 0.2.3
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.2.${{ github.run_number }}"  # main push or dispatch fallback
          fi
          echo "Publishing version: $VERSION"
          echo "PUBLISH_VERSION=$VERSION" >> "$GITHUB_ENV"

      # Step A: Gradle stages publications into build/staged-maven-repo/
      # (TigrisStaging maven repo, file:// URL).
      - name: Stage publications to local Maven layout
        # workers.max=16 helps the per-task assemble/sign step.
        run: ./gradlew -Pversion=${{ env.PUBLISH_VERSION }} -Dorg.gradle.workers.max=16 publishAllPublicationsToTigrisStagingRepository

      # Step B: aws s3 sync uploads the whole tree to Tigris in one parallel
      # pass (~10 concurrent uploads by default). Measured ~20 s for ~1,560
      # files — vs ~12 min for the old Gradle s3:// path.
      - name: Sync staged repo to Tigris
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
        # No `pipefail`: `find | head -30` would SIGPIPE find.
        run: |
          set -eu
          STAGED=build/staged-maven-repo
          TOTAL=$(find "$STAGED" -type f | wc -l)
          echo "=== publishing version $PUBLISH_VERSION ($TOTAL files) ==="
          time aws --endpoint-url=https://fly.storage.tigris.dev s3 sync \
            "$STAGED/" s3://buildcache/maven/ --no-progress
