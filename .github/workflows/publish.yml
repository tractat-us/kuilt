name: publish

# Publishing is intentional, not automatic — it does NOT run on every main push.
# That imposed a ~30-min tax per merge (#24, serial GitHub-Packages uploads) while
# the API is still moving. Publish by cutting a tag:
#
#   git tag v0.1.7 && git push origin v0.1.7
#
# or trigger this workflow manually (Actions → publish → Run workflow) with an
# explicit version. The version comes from the tag (v0.1.7 → 0.1.7). Day-to-day,
# consumers can use a presence-gated `includeBuild` override; cut a tag when you
# want consumer CI (which resolves the published artifact) to pick up changes.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, e.g. 0.1.7 (defaults to 0.1.<run_number>).'
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # ~40 publications (7 modules × ~6 targets) each upload ~30-45s to GitHub
    # Packages → ~30-40 min total, which outgrew the old 30-min cap as
    # :kuilt-nearby + :kuilt-session were added (runs #19/#20 were killed
    # mid-stream, not stalled). 60 gives headroom; the socket timeout (#21)
    # still catches a genuinely stalled upload.
    timeout-minutes: 60
    # Shared S3 build cache (Fly Tigris) so the compile phase reuses warm artifacts
    # from the build job for the same commit. Note: caching helps only the ~2 min
    # compile — the ~30+ min cost is serial GitHub-Packages uploads (see #24), which
    # no cache or parallelism addresses.
    env:
      S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
      S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Compute version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            # Tag push: refs/tags/v0.1.7 → ref_name "v0.1.7" → "0.1.7".
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch: explicit input, else a 0.1.<run_number> snapshot.
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then VERSION="0.1.${{ github.run_number }}"; fi
          fi
          echo "Publishing version: $VERSION"
          echo "PUBLISH_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -Pversion=${{ env.PUBLISH_VERSION }} publishAllPublicationsToGitHubPackagesRepository
