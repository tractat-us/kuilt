name: publish

# Publishes kuilt to Tigris (Fly's S3-compatible object storage). Every push to
# main publishes `${kuiltVersionLine}.<run_number>` from gradle.properties (so
# bumping the major.minor on a breaking-API release is a one-line PR — see
# #22 for the full cutover history). Wall time is now ~5 min total (~20 s for
# the actual upload via `aws s3 sync`), down from ~21 min on the old GitHub
# Packages path. Tags are NOT a trigger — they're for tagging; publishing is
# continuous from main.
#
# Why staging-dir + AWS CLI instead of Gradle's native s3:// transport:
# Gradle silently sets a request header (ACL or storage-class) Tigris rejects
# with HTTP 400. Probe results + cutover details in #22. Gradle's job is to
# stage to build/staged-maven-repo/; the upload is a separate `aws s3 sync` step.

on:
  push:
    branches: [main]
    tags: ['v*']            # v<x.y.z> → Maven Central release (maven-central job only)
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version (defaults to ${kuiltVersionLine}.<run_number> from gradle.properties).'
        required: false
      release_to_central:
        description: 'Stage a release to Maven Central (uploads as a PENDING deployment — you release it by hand in the Central Portal afterward).'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Tigris (build-cache) publish — every main push + manual dispatch. Deliberately
    # NOT tag pushes: tags are Maven Central releases (the maven-central job below).
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      S3_BUILD_CACHE_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
      S3_BUILD_CACHE_SECRET_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Compute version
        run: |
          set -eu
          # Read the major.minor line from gradle.properties — single source of
          # truth shared with build.gradle.kts. Bump it there on breaking API.
          VERSION_LINE=$(grep '^kuiltVersionLine=' gradle.properties | cut -d= -f2)
          if [ -z "$VERSION_LINE" ]; then
            echo "::error::Could not read kuiltVersionLine from gradle.properties" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${VERSION_LINE}.${{ github.run_number }}"  # main push or dispatch fallback
          fi
          echo "Publishing version: $VERSION (line: $VERSION_LINE)"
          echo "PUBLISH_VERSION=$VERSION" >> "$GITHUB_ENV"

      # Step A: Gradle stages publications into build/staged-maven-repo/
      # (TigrisStaging maven repo, file:// URL).
      - name: Stage publications to local Maven layout
        # workers.max=16 helps the per-task assemble/sign step.
        run: ./gradlew -Pversion=${{ env.PUBLISH_VERSION }} -Dorg.gradle.workers.max=16 publishAllPublicationsToTigrisStagingRepository

      # Step B: aws s3 sync uploads the whole tree to Tigris in one parallel
      # pass (~10 concurrent uploads by default). Measured ~20 s for ~1,560
      # files — vs ~12 min for the old Gradle s3:// path.
      - name: Sync staged repo to Tigris
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_BUILD_CACHE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_BUILD_CACHE_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
        # No `pipefail`: `find | head -30` would SIGPIPE find.
        run: |
          set -eu
          STAGED=build/staged-maven-repo
          TOTAL=$(find "$STAGED" -type f | wc -l)
          echo "=== publishing version $PUBLISH_VERSION ($TOTAL files) ==="
          # `aws s3 sync` is idempotent — it transfers only files missing/changed at the
          # destination — so retry on transient Tigris errors (e.g. a spurious NoSuchBucket
          # under parallel PUTs, which once partially published a release). Each retry uploads
          # only what the previous pass missed, so it's cheap and converges.
          attempt=1
          max=4
          until time aws --endpoint-url=https://fly.storage.tigris.dev s3 sync \
                "$STAGED/" s3://buildcache/maven/ --no-progress; do
            if [ "$attempt" -ge "$max" ]; then
              echo "::error::aws s3 sync failed after $max attempts" >&2
              exit 1
            fi
            echo "::warning::aws s3 sync attempt $attempt failed; retrying in $((attempt * 5))s" >&2
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

  # ── Maven Central (Central Portal) ──────────────────────────────────────────
  # RELEASE-CONTROLLED. Runs ONLY on a version tag (v<x.y.z>) or a manual dispatch
  # with release_to_central=true — NEVER on a plain main push. Uploads signed
  # artifacts to the Portal as a *pending* deployment (automaticRelease=false in
  # the publish convention), which a human then releases at central.sonatype.com.
  # So the first version that ships — and every one after — is a deliberate act.
  # Independent of the Tigris job above (different artifact store, different cadence).
  maven-central:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_to_central)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to commit the README version bump back to main
    env:
      # vanniktech reads these as Gradle properties via the ORG_GRADLE_PROJECT_ prefix.
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: wrapper
          cache-read-only: false
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'gradle.properties', 'settings.gradle.kts') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Compute release version
        run: |
          set -eu
          # Tag push: version is the tag minus the leading 'v' (v0.4.0 → 0.4.0).
          # Manual dispatch: REQUIRE an explicit version — never a throwaway
          # run-number version for a permanent, immutable Central release.
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Maven Central release needs an explicit version (tag v<x.y.z> or the 'version' dispatch input)." >&2
            exit 1
          fi
          echo "Releasing version to Maven Central: $VERSION"
          echo "PUBLISH_VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Preflight — required secrets present
        # Fail fast with a clear message rather than halfway through a publish.
        run: |
          set -eu
          : "${ORG_GRADLE_PROJECT_mavenCentralUsername:?MAVEN_CENTRAL_USERNAME secret is not set}"
          : "${ORG_GRADLE_PROJECT_mavenCentralPassword:?MAVEN_CENTRAL_PASSWORD secret is not set}"
          : "${ORG_GRADLE_PROJECT_signingInMemoryKey:?SIGNING_KEY secret is not set}"
          echo "All required Central + signing secrets are present."
      - name: Upload to Maven Central (pending — release by hand in the Portal)
        # publishToMavenCentral (NOT ...AndRelease) honours automaticRelease=false:
        # the deployment is uploaded + validated, then waits for a manual release.
        run: ./gradlew -Pversion=${{ env.PUBLISH_VERSION }} --no-configuration-cache publishToMavenCentral
      - name: Update README coordinates to released version
        # Rewrites every us.tractat.kuilt:<module>:<old-version> in README.md to
        # the new version and opens a PR (branch protection prevents direct main push
        # from Actions even with contents:write).
        run: |
          set -eu
          sed -i -E "s|(us\.tractat\.kuilt:[a-z-]+:)[0-9A-Za-z._-]+|\1${{ env.PUBLISH_VERSION }}|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="docs/readme-coords-${{ env.PUBLISH_VERSION }}"
          git checkout -b "$BRANCH"
          git add README.md
          if git diff --staged --quiet; then
            echo "README already up to date — nothing to commit"
            exit 0
          fi
          git commit -m "docs: update README coordinates to ${{ env.PUBLISH_VERSION }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: update README coordinates to ${{ env.PUBLISH_VERSION }}" \
            --body "Automated bump from the Maven Central release workflow." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
