<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
  <style>
    .title{fill:#e5e7eb;font-size:19px;font-weight:700}
    .sub{fill:#7f848e;font-size:12.5px}
    .ph{font-size:11px;font-weight:700;fill:#7f848e;letter-spacing:.4px}
    .sl{font-size:12.5px;font-weight:700}
    .d{font-size:9.5px;fill:#9aa0ab}
    .lane{font-size:11px;font-weight:700;letter-spacing:.5px}
    .flow{stroke:#5a6472;stroke-width:2;fill:none;marker-end:url(#m)}
  </style>
  <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#5a6472"/></marker>
  <rect fill="#161a22" width="940" height="420"/>
  <text class="title" x="36" y="34">Epic slices — the phased roadmap</text>
  <text class="sub" x="36" y="54">One independent reality lane (anytime) above a sequential dream lane (gated on the spike).</text>

  <!-- phase headers -->
  <text class="ph" x="160" y="86">PHASE 0 · probe</text>
  <text class="ph" x="320" y="86">PHASE 1 · foundation</text>
  <text class="ph" x="480" y="86">PHASE 2 · code mobility</text>
  <text class="ph" x="650" y="86">PHASE 3 · smarts</text>
  <text class="ph" x="810" y="86">PHASE 4 · payoff</text>

  <!-- REALITY lane -->
  <text class="lane" x="36" y="120" fill="#98c379">REALITY</text>
  <rect x="36" y="128" width="868" height="52" rx="11" fill="#16201a" stroke="#98c379" stroke-width="1.5"/>
  <text class="sl" x="54" y="152" fill="#98c379">A · Offline OTel exporter</text>
  <text class="d" x="54" y="168">parallel · needs no warp · the one slice you can ship to real users today</text>

  <!-- DREAM lane -->
  <text class="lane" x="36" y="214" fill="#e5c07b">THE DREAM</text>

  <!-- phase cards -->
  <rect x="150" y="226" width="140" height="56" rx="10" fill="#16202b" stroke="#61afef88" stroke-width="1.5"/>
  <text class="sl" x="160" y="248" fill="#9ecbf0">0 · Spike #680</text><text class="d" x="160" y="266">prove CALM, throwaway</text>

  <rect x="310" y="226" width="140" height="56" rx="10" fill="#211c17" stroke="#e5c07b66"/>
  <text class="sl" x="320" y="248" fill="#e5c07b">B · Type seam</text><text class="d" x="320" y="266">CoordFree/Coordinated</text>

  <rect x="470" y="200" width="140" height="50" rx="10" fill="#211c17" stroke="#e5c07b66"/>
  <text class="sl" x="480" y="220" fill="#e5c07b">C · Code mobility</text><text class="d" x="480" y="236">wasm + bobbins</text>
  <rect x="470" y="258" width="140" height="50" rx="10" fill="#211c17" stroke="#e5c07b66"/>
  <text class="sl" x="480" y="278" fill="#e5c07b">D · Compiler nodes</text><text class="d" x="480" y="294">tiered compile</text>

  <rect x="640" y="226" width="140" height="56" rx="10" fill="#211c17" stroke="#e5c07b66"/>
  <text class="sl" x="650" y="248" fill="#e5c07b">E · Query planning</text><text class="d" x="650" y="266">Draft → Draft</text>

  <rect x="800" y="226" width="140" height="56" rx="10" fill="#211c17" stroke="#e5c07b66"/>
  <text class="sl" x="810" y="248" fill="#e5c07b">F · Federated ML</text><text class="d" x="810" y="266">FedAvg demo</text>

  <!-- flow arrows -->
  <path class="flow" d="M290 254 H310"/>
  <path class="flow" d="M450 254 H468"/>
  <path class="flow" d="M610 246 C 624 240, 628 252, 640 254"/>
  <path class="flow" d="M780 254 H800"/>

  <text class="d" x="36" y="360" fill="#7f848e">Phase 2 holds two slices (C then D). Every dream phase is gated on Phase 0; Reality runs beside all of it.</text>
  <text class="d" x="36" y="380" fill="#7f848e">Each phase = one epic sub-issue with its own green checkpoint; the spike (#680) already exists as the planning probe.</text>
</svg>
