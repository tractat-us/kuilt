<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
  <defs>
    <pattern id="warp" width="20" height="12" patternUnits="userSpaceOnUse">
      <line x1="10" y1="0" x2="10" y2="12" stroke="#2f5f3a" stroke-width="2"/>
    </pattern>
  </defs>
  <style>
    .title{fill:#e5e7eb;font-size:20px;font-weight:700}
    .lbl{font-size:13px;font-weight:700;letter-spacing:.5px}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#cdd3de}
    .note{fill:#abb2bf;font-size:12.5px}
    .blue{fill:#61afef}.grn{fill:#98c379}.tl{fill:#56b6c2}.am{fill:#e5c07b}.cm{fill:#7f848e}
    .arrow{stroke:#3a4150;stroke-width:2.5;fill:none;marker-end:url(#a)}
  </style>
  <marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#3a4150"/></marker>
  <rect fill="#161a22" width="800" height="520"/>
  <text class="title" x="40" y="40">One loom, three layers</text>

  <!-- DRAFT -->
  <text class="lbl blue" x="240" y="78">THE DRAFT · the recipe</text>
  <rect x="240" y="86" width="320" height="40" rx="9" fill="#16202b" stroke="#61afef66" stroke-width="1.5"/>
  <text class="mono" x="258" y="111"><tspan class="tl">draft</tspan> { <tspan class="tl">shuttle</tspan>(::score).<tspan class="tl">weave</tspan>() }</text>
  <text class="note" x="240" y="146">declared as a value — how warp &amp; weft interlace. Nothing has run yet.</text>
  <path class="arrow" d="M400 156 L400 180"/>

  <!-- CLOTH -->
  <rect x="120" y="190" width="560" height="206" rx="12" fill="#10130f" stroke="#98c37966" stroke-width="1.5"/>
  <text class="lbl grn" x="138" y="214">THE CLOTH · coordination-free</text>
  <rect x="470" y="200" width="196" height="22" rx="11" fill="#98c37918" stroke="#98c37955"/>
  <text x="568" y="216" text-anchor="middle" font-size="11.5" font-weight="700" fill="#98c379">ZERO COORDINATION</text>

  <!-- warp threads -->
  <rect x="140" y="232" width="520" height="120" fill="url(#warp)"/>
  <!-- weft + shuttle -->
  <line x1="140" y1="292" x2="660" y2="292" stroke="#98c379" stroke-width="2.5"/>
  <ellipse cx="392" cy="292" rx="20" ry="8" fill="#56b6c2"/>
  <text x="392" y="296" text-anchor="middle" font-size="10" font-weight="700" fill="#0d1b1b">shuttle</text>
  <text class="note" x="140" y="372"><tspan fill="#56b6c2">warp</tspan> = parallel lanes across peers · the <tspan fill="#56b6c2">shuttle</tspan> throws the <tspan fill="#98c379">weft</tspan> · <tspan fill="#56b6c2">weave</tspan> gathers it into cloth</text>

  <!-- embroidery stitches on the cloth -->
  <g stroke="#e5c07b" stroke-width="2.5" stroke-linecap="round">
    <path d="M556 250 l12 12 M568 250 l-12 12"/>
    <path d="M576 262 l12 12 M588 262 l-12 12"/>
    <path d="M596 250 l12 12 M608 250 l-12 12"/>
  </g>
  <path class="arrow" d="M582 286 C 582 320, 600 330, 628 338" />

  <!-- EMBROIDERY callout -->
  <rect x="120" y="416" width="560" height="74" rx="12" fill="#241f17" stroke="#e5c07b66" stroke-width="1.5"/>
  <text class="lbl am" x="138" y="440">THE EMBROIDERY · consensus, by hand</text>
  <text class="note" x="138" y="462">The deliberate finishing stitched onto the cloth with a different tool (a needle, not a shuttle).</text>
  <text class="mono" x="138" y="482"><tspan class="cm">cloth.</tspan><tspan class="am">embroider</tspan><tspan class="cm"> { top().commit(raft) }</tspan>  <tspan class="cm">— the only Raft round in the program</tspan></text>
</svg>
