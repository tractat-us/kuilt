  <path class="lk" d="M694 196 V214 M694 244 V258 M660 280 H660 M694 248 L630 258 M694 248 L758 258"/>

  <!-- bottom guarantee -->
  <rect x="32" y="404" width="816" height="42" rx="10" fill="#10130f" stroke="#98c37944"/>
  <text x="440" y="430" text-anchor="middle" font-size="13" font-weight="600" fill="#98c379">Idempotent CRDT merge â‡’ a resend can't double-count: metrics are cumulative, spans dedup by id, logs merge by sequence.</text>
</svg>
